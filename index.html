<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hospital Check-in</title>

  <link rel="stylesheet" href="style.css">

  <!-- Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="container">

  <h2>🏥 Hospital Check-in System</h2>

  <!-- IMPORT -->
  <div class="import-box">
    <label for="fileInput" class="btn btn-file">📁 Choose File</label>
    <input type="file" id="fileInput" />

    <button class="btn btn-import" onclick="importExcel()">
      ⬆ Import
    </button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="card">
      <span>Total</span>
      <strong id="total">0</strong>
    </div>
    <div class="card">
      <span>Done</span>
      <strong id="done">0</strong>
    </div>
    <div class="card">
      <span>Pending</span>
      <strong id="pending">0</strong>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table id="customerTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Passport</th>
          <th>Photo</th>
          <th>Work Permit</th>
          <th>Scan</th>
          <th>Checkout</th>
          <th>Signed</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
