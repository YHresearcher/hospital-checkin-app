<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hospital Check-in</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- XLSX (import excel) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<h2>🏥 Hospital Check-in System</h2>

<div class="import-box">
  <input type="file" id="fileInput" />
  <button onclick="importExcel()">Import Excel</button>
</div>

<div id="dashboard">
  <div class="card">
    <h3>Total</h3>
    <p id="total">0</p>
  </div>
  <div class="card">
    <h3>Done</h3>
    <p id="done">0</p>
  </div>
  <div class="card">
    <h3>Pending</h3>
    <p id="pending">0</p>
  </div>
</div>

<div class="table-container">
  <table id="customerTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Passport</th>
        <th>Photo</th>
        <th>Work Permit</th>
        <th>Scan</th>
        <th>Checkout</th>
        <th>Signed</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- JS -->
<script src="app.js"></script>

</body>
</html>
