<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Check-in System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Hospital Check-in</h2>

<div id="dashboard">
  <p>Total: <span id="total"></span></p>
  <p>Done: <span id="done"></span></p>
  <p>Pending: <span id="pending"></span></p>
</div>

<table id="customerTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Passport</th>
      <th>Photo</th>
      <th>Work Permit</th>
      <th>Scan</th>
      <th>Checkout</th>
      <th>Signed</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="app.js"></script>
</body>
</html>
