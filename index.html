<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hospital Check-in</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Hospital Check-in System</h2>
<div id="dashboard">
  <h3>Dashboard</h3>
  <p>Tổng khách: <span id="total"></span></p>
  <p>Đã hoàn tất: <span id="done"></span></p>
  <p>Chưa hoàn tất: <span id="pending"></span></p>
</div>
<table id="customerTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Passport</th>
      <th>Photo</th>
      <th>Work Permit</th>
      <th>Scan</th>
      <th>Checkout</th>
      <th>Signed</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="app.js"></script>
</body>
</html>
